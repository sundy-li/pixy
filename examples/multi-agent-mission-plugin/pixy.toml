# Example pixy.toml for mission-style multi-agent orchestration.
# Default agent acts as orchestrator; code/review workers come from plugin manifest.

[llm]
default_provider = "openai"

[[llm.providers]]
name = "openai"
kind = "chat"
provider = "openai"
api = "openai-responses"
base_url = "https://api.openai.com/v1"
api_key = "$OPENAI_API_KEY"
model = "gpt-5.3-codex"
weight = 1

[multi_agent]
enabled = true

[[multi_agent.plugins]]
# Relative paths resolve from the pixy.toml directory.
path = "plugins/mission-plugin.toml"
